[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "slumbr"
version = "0.1.0"
description = "Local voice-to-text dictation runner for Windows (offline, Whisper-powered)."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [{ name = "Slumbr contributors" }]
keywords = ["speech-to-text", "dictation", "whisper", "voice", "stt", "offline"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Win32 (MS Windows)",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: Microsoft :: Windows :: Windows 11",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
]

dependencies = [
    "faster-whisper==1.2.1",
    "sounddevice==0.3.12",
    "numpy",
    "pynput==1.7.6",
    "pyperclip",
    "PySide6==6.7.0",
    "pyqtgraph",
    "pystray",
    "Pillow",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
]
package = [
    "pyinstaller==6.8.0",
]

[project.scripts]
slumbr = "slumbr.__main__:main"

[tool.setuptools.packages.find]
include = ["slumbr*"]

[tool.setuptools.package-data]
slumbr = ["assets/*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]
